<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladder and Snake - 48 Channels</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom styles if needed */
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-green-50 via-teal-100 to-emerald-50 min-h-screen flex flex-col overflow-x-hidden">
    <div
        class="container mx-auto max-w-5xl flex flex-col md:flex-row gap-4 md:gap-8 p-4 md:p-8 flex-grow justify-start md:justify-center items-center md:items-start">

        <!-- Top Controls Section (Mobile: Top, Desktop: Left) -->
        <div id="top-controls"
            class="w-full md:w-auto flex flex-row md:flex-col items-center justify-center gap-4 p-4 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl border border-white/50 z-40 order-1">
            <div id="dice-container"
                class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center text-5xl text-slate-800 shadow-[0_8px_30px_rgb(0,0,0,0.05)] font-bold cursor-pointer transition-transform hover:scale-105 active:scale-95 border border-slate-100 shrink-0">
                🎲
            </div>
            <div class="flex flex-col items-center gap-1">
                <button id="roll-btn"
                    class="bg-gradient-to-r from-orange-400 to-pink-500 hover:from-orange-500 hover:to-pink-600 text-white font-bold py-3 px-6 rounded-xl text-lg shadow-lg transform transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 whitespace-nowrap">
                    <span>ทอยเต๋า!</span>
                </button>
                <div
                    class="text-xs font-bold text-slate-500 bg-white/50 px-3 py-1 rounded-full border border-slate-200">
                    เหลือ: <span id="moves-display" class="text-orange-500 text-sm">20</span> ครั้ง
                </div>
            </div>
        </div>

        <!-- Game Board Section -->
        <!-- Game Container (Wrapper) -->
        <div id="game-container"
            class="relative w-full max-w-[540px] aspect-[3/4] mx-auto shadow-2xl rounded-3xl border-4 border-emerald-100 overflow-hidden bg-emerald-50 order-2">

            <!-- Board Grid (Cells Only) -->
            <div id="game-board" class="grid grid-cols-6 gap-1 w-full h-full p-1 relative z-10">
                <!-- Grid cells will be generated by JS -->
            </div>

            <!-- Canvas Overlay for Snakes and Ladders -->
            <canvas id="board-canvas" class="absolute top-0 left-0 w-full h-full z-20 pointer-events-none"></canvas>

            <!-- Player Token -->
            <div id="player" class="absolute top-0 left-0 z-30 transition-all duration-500 ease-in-out">
                <div
                    class="w-8 h-8 sm:w-10 sm:h-10 bg-orange-500 rounded-full border-2 border-white shadow-lg flex items-center justify-center text-white font-bold text-xs sm:text-sm transform hover:scale-110 transition-transform">
                    🏃
                </div>
            </div>
        </div>

        <!-- Info/Status Section (Mobile: Bottom, Desktop: Right) -->
        <div
            class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl w-full md:w-80 border border-white/50 text-slate-700 flex flex-col items-center order-3">
            <div class="mb-4 text-center">
                <span
                    class="inline-block px-3 py-1 bg-teal-100 text-teal-700 rounded-full text-xs font-bold mb-2 tracking-wider">HEALTHY
                    MODE</span>
                <h1 class="text-4xl font-extrabold mb-1 text-emerald-600 drop-shadow-sm">เก๋า ไม่ล้ม 💪</h1>
                <p class="text-slate-500 text-sm">สุขภาพดี สะสมแต้ม!</p>
            </div>

            <div
                class="mb-6 w-full bg-gradient-to-r from-emerald-50 to-teal-50 p-6 rounded-2xl text-center border border-emerald-100">
                <p class="text-emerald-600 text-xs font-bold uppercase tracking-wide mb-1">ตำแหน่งของคุณ</p>
                <div id="position-display" class="text-5xl font-black text-emerald-500">1</div>
            </div>

            <!-- Dice was here -->

            <div class="w-full bg-white/50 p-4 rounded-xl text-sm text-slate-500 border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-2 flex items-center gap-2">🔔 สถานะเกม</h3>
                <p id="game-status" class="leading-relaxed">พร้อมลุยหรือยัง? กดปุ่มเพื่อเริ่ม!</p>
            </div>

            <button id="reset-btn"
                class="mt-6 text-slate-400 hover:text-orange-400 text-sm font-medium transition-colors">
                ↺ เริ่มเกมใหม่
            </button>
        </div>

    </div>

    <!-- Winning Modal -->
    <div id="win-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden backdrop-blur-md">
        <div
            class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-md mx-4 transform transition-all scale-100 animate-bounce-in border-4 border-emerald-100">
            <div class="text-7xl mb-6 animate-pulse">🎉</div>
            <h2 class="text-4xl font-extrabold text-emerald-600 mb-2">สุดยอดมาก!</h2>
            <p class="text-lg text-slate-600 mb-8">คุณออกกำลังกายจนถึงเส้นชัยแล้ว!</p>
            <button id="play-again-btn"
                class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-xl transition transform hover:scale-105 active:scale-95 text-lg">
                เล่นอีกรอบ
            </button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
